<!-- Scroll runway so a section that ends the page can still scroll its
     bottom rows up far enough to trip their reveal observers. -->
<div class="pv-spacer" aria-hidden="true" style="height:70vh"></div>

<script>
  // Preview switcher: jump-scroll to a look (all stay mounted so their
  // scroll-triggered animations play naturally as you arrive).
  (function () {
    var tabs = Array.prototype.slice.call(document.querySelectorAll('.pv-tab'));
    tabs.forEach(function (t) {
      t.addEventListener('click', function () {
        var which = t.getAttribute('data-look');
        if (which === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
        var target = document.getElementById('look-' + which);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  })();
</script>

</body>
</html>
